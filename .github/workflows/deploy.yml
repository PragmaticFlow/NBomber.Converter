name: deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    environment: PROD
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 10.x.x
      
    - name: Pack
      run: dotnet pack src/NBomber.Converter/NBomber.Converter.csproj -c Release -o artifacts --include-source
      
    - name: Pack Tool
      run: dotnet pack src/NBomber.Converter.Tool/NBomber.Converter.Tool.csproj -c Release -o artifacts --include-source
      
    - name: Publish
      run: dotnet nuget push artifacts/**.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_TOKEN }}